# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
api:
  specs:
    - openapi: ../api/openapi.yaml
default-group: local
groups:
  local:
    generators:
      - name: fern-typescript-sdk
        output:
          location: local-file-system
          path: ../sdks/typescript
        version: 3.62.1
      - name: fern-python-sdk
        version: 5.2.1
        output:
          location: local-file-system
          path: ../sdks/python
  publish:
    generators:
      - name: fern-typescript-sdk
        version: 3.62.1
        output:
          location: npm
          package-name: concrete-sdk
          token: ${NPM_TOKEN}
      - name: fern-python-sdk
        version: 5.2.1
        output:
          location: pypi
          package-name: concrete-sdk
          token: ${PYPI_TOKEN}
