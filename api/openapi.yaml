openapi: 3.1.0
info:
  title: Concrete API
  description: The single source of truth for the Concrete SDK
  version: 0.0.1
servers:
  - url: https://kb-upload-w2uumyfi7a-oa.a.run.app

paths:
  /health:
    servers:
      - url: https://kb-upload-w2uumyfi7a-oa.a.run.app
    get:
      summary: Health Check
      operationId: getHealth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /upload:
    servers:
      - url: https://kb-upload-w2uumyfi7a-oa.a.run.app
    post:
      summary: Upload a file
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload (PDF, TXT, DOCX, etc.)
                metadata:
                  type: string
                  description: Optional JSON metadata associated with the file
      responses:
        '200':
          description: File successfully uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
  /baugesuch/start:
    servers:
      - url: https://baugesuch-start-w2uumyfi7a-oa.a.run.app
    post:
      summary: Start an async baugesuch compliance check
      operationId: startBaugesuch
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - documents
              properties:
                documents:
                  type: array
                  items:
                    type: string
                  description: List of extracted document texts to analyse
      responses:
        '202':
          description: Run started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaugesuchStartResponse'
        '401':
          description: Invalid or missing API key
        '400':
          description: Invalid request body
  /baugesuch/run/{thread_id}/{run_id}:
    servers:
      - url: https://baugesuch-start-w2uumyfi7a-oa.a.run.app
    get:
      summary: Wait for baugesuch run completion and return result
      operationId: getBaugesuchRun
      security:
        - BearerAuth: []
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Run completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaugesuchRunResult'
        '401':
          description: Invalid or missing API key
        '404':
          description: Run not found
  /start_vector_update:
    servers:
      - url: https://vectorize-user-kb-api-w2uumyfi7a-oa.a.run.app
    post:
      summary: Start vector update
      operationId: startVectorUpdate
      responses:
        '200':
          description: Vector update started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorUpdateResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
  schemas:
