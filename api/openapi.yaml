        - run_id
      properties:
        thread_id:
          type: string
          description: LangGraph thread ID
        run_id:
          type: string
          description: LangGraph run ID
    BaugesuchRunResult:
      type: object
      required:
        - summary
      properties:
        summary:
          type: string
          description: Markdown compliance report
        results:
          type: array
