openapi: 3.1.0
info:
  title: Concrete API
  description: The single source of truth for the Concrete SDK
  version: 0.0.1
servers:
  - url: https://kb-upload-w2uumyfi7a-oa.a.run.app

paths:
  /health:
    servers:
      - url: https://kb-upload-w2uumyfi7a-oa.a.run.app
    get:
      summary: Health Check
      operationId: getHealth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /upload:
    servers:
      - url: https://kb-upload-w2uumyfi7a-oa.a.run.app
    post:
      summary: Upload a file
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload (PDF, TXT, DOCX, etc.)
                metadata:
                  type: string
                  description: Optional JSON metadata associated with the file
      responses:
        '200':
          description: File successfully uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
  /start_vector_update:
    servers:
      - url: https://vectorize-user-kb-api-w2uumyfi7a-oa.a.run.app
    post:
      summary: Start vector update
      operationId: startVectorUpdate
      responses:
        '200':
          description: Vector update started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorUpdateResponse'

